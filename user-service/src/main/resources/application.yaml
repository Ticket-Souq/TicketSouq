spring:
  application:
    name:  user-service
  config:
    import: optional:file:./profile.properties

  datasource:
    url: jdbc:postgresql://localhost:5433/user_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
server:
  port: 0
