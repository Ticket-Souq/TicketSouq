server:
  port: 8888

spring:
  application:
    name: config-server

  profiles:
    active: native

  cloud:
    config:
      server:
        native:
          search-locations:
            - classpath:/config-repo/
            - classpath:/config-repo/{application}/

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
