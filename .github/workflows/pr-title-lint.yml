name: PR Title Lint

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            refactor
            docs
            chore
            test
            perf
          scopes: |
            config-server
            eureka
            auth
            ticket
            venue
            analytics
            audit
            notification
            availability-locking
            event
            payment
            reservation
            libs
            infra
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title's description should start with a lowercase letter.
