<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Successful</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,.1);
        }

        .header {
            background: #28a745;
            color: white;
            text-align: center;
            padding: 24px;
        }

        .content {
            padding: 32px;
            color: #333;
            line-height: 1.6;
        }

        .footer {
            text-align: center;
            color: #888;
            font-size: 13px;
            padding: 20px;
            border-top: 1px solid #eee;
        }

        .event {
            background: #f8f9fa;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin: 20px 0;
        }

        .button {
            display: inline-block;
            margin-top: 20px;
            background: #28a745;
            color: white !important;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <h2>Payment Successful 🎉</h2>
    </div>

    <div class="content">

        <p>Hello <strong th:text="${customerName}">Customer</strong>,</p>

        <p>
            Your payment has been completed successfully.
            Your booking is now confirmed.
        </p>

        <div class="event">
            <p><strong>Event:</strong> <span th:text="${eventName}">Event Name</span></p>
            <p><strong>Date:</strong> <span th:text="${date}">2026-08-20</span></p>
            <p><strong>Location:</strong> <span th:text="${location}">Cairo</span></p>
            <p><strong>Amount Paid:</strong> <span th:text="${amount}">$100</span></p>
        </div>

        <p>
            Your tickets will be available shortly.
        </p>

    </div>

    <div class="footer">
        Thank you for choosing Ticketaty ❤️
    </div>

</div>

</body>
</html>
