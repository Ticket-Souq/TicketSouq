services:
  venue-db:
    image: postgres
    container_name: venue-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: venue_db
    ports:
      - "5435:5432"
    volumes:
      - postgres_venue_data:/var/lib/postgresql

volumes:
  postgres_venue_data:
