services:

  # ─── Databases ──────────────────────────────────────────────

  auth-db:
    image: postgres
    container_name: auth-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: auth_db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql
    networks:
      - Ticket-Souq-Microservice
  user-db:
    image: postgres
    container_name: user-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: user_db
    ports:
      - "5438:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql
    networks:
      - Ticket-Souq-Microservice
  notification-db:
    image: postgres
    container_name: notification-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: notification_db
    ports:
      - "5433:5432"
    restart: unless-stopped
    volumes:
      - postgres_notification_data:/var/lib/postgresql
    networks:
      - Ticket-Souq-Microservice

  venue-db:
    image: postgres
    container_name: venue-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: venue_db
    restart: unless-stopped
    ports:
      - "5435:5432"
    volumes:
      - postgres_venue_data:/var/lib/postgresql
    networks:
      - Ticket-Souq-Microservice
  event-db:
    image: postgres
    container_name: event-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: event_db
    restart: unless-stopped
    ports:
      - "5434:5432"
    volumes:
      - postgres_event_data:/var/lib/postgresql
    networks:
      - Ticket-Souq-Microservice

  # ─── Messaging ──────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - Ticket-Souq-Microservice

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8086:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - Ticket-Souq-Microservice

  # ─── Observability ──────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.46.0
    container_name: prometheus
    volumes:
      - ./Docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --enable-feature=exemplar-storage
    ports:
      - "9090:9090"
    networks:
      - Ticket-Souq-Microservice

  loki:
    image: grafana/loki:main
    container_name: loki
    command:
      - -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - Ticket-Souq-Microservice

  tempo:
    image: grafana/tempo:2.2.2
    container_name: tempo
    command:
      - -config.file=/etc/tempo.yaml
    volumes:
      - ./Docker/tempo/tempo.yml:/etc/tempo.yaml:ro
      - ./data/tempo:/tmp/tempo
    ports:
      - "3200:3200"
      - "9411:9411"   # zipkin listen port
#      - "4317:4317"   # OTLP gRPC
#      - "4318:4318"   # OTLP HTTP — services send directly here
    networks:
      - Ticket-Souq-Microservice

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: true
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: true
      GF_PLUGINS_PREINSTALL: hamedkarbasi93-kafka-datasource
    volumes:
      - ./Docker/grafana:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - Ticket-Souq-Microservice

  # ─── Cache ──────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - Ticket-Souq-Microservice


#   ─── Spring Boot Services (commented out until built) ───────

#  config-server:
#  discovery-server:
#  api-gateway:
#  user-service:


volumes:
  postgres_user_data:
  postgres_auth_data:
  postgres_event_data:
  postgres_venue_data:
  postgres_ticket_data:
  postgres_reservation_data:
  postgres_payment_data:
  postgres_notification_data:
  postgres_audit_data:
  postgres_analytics_data:
  postgres_availability_locking_data:
  kafka_data:
  es_data:
  redis_data:

networks:
  Ticket-Souq-Microservice:
    name: Ticket-Souq-Microservice
    driver: bridge


