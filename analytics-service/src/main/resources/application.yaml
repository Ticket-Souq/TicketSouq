spring:
  application:
    name:  analytics-service
  config:
    import: optional:file:./profile.properties
  cloud:
    config:
      import-check:
        enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5436/analytics_db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

eureka:
  client:
    enabled: false

server:
  port: 4234
